<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Store 2000 - Iniciar Sesión</title>

    <!-- Bootstrap 5 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- js-yaml para leer archivos YAML (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

    <!-- Nuestros estilos personalizados (estética retro Steam 2002) -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ===================== NAVBAR (idéntica en todas las páginas) ===================== -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">

            <!-- Logo STEAM con estilo industrial -->
            <a class="navbar-brand fw-bold" href="index.html">STEAM</a>

            <!-- Botón hamburguesa para móviles -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Enlaces de navegación -->
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <!-- Cada enlace tiene data-seccion para que traducciones.js lo identifique -->
                    <li class="nav-item">
                        <a class="nav-link" href="index.html" data-seccion="tienda">Tienda</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="inventario.html" data-seccion="inventario">Inventario</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="login.html" data-seccion="login" id="nav-login">Iniciar Sesión</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="registro.html" data-seccion="registro" id="nav-registro">Registrarse</a>
                    </li>
                </ul>

                <!-- Selector de idioma -->
                <select id="selector-idioma" class="form-select form-select-sm w-auto me-3">
                    <option value="es">ES</option>
                    <option value="en">EN</option>
                </select>

                <!-- Switch para cambiar entre tema claro y oscuro -->
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="themeSwitch" checked>
                    <label class="form-check-label text-light" for="themeSwitch">Modo oscuro</label>
                </div>
            </div>

        </div>
    </nav>

    <!-- ===================== CONTENIDO PRINCIPAL - LOGIN ===================== -->
    <main id="app" class="container my-4">

        <!-- Formulario centrado en la página -->
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-lg-4">
                <div class="card bg-dark text-light">

                    <!-- Header de la card -->
                    <div class="card-header text-center">
                        <h4 id="login-titulo" class="mb-0">Iniciar Sesión en Steam</h4>
                    </div>

                    <!-- Body con el formulario -->
                    <div class="card-body">
                        <form id="form-login" novalidate>

                            <!-- Campo Usuario o Email -->
                            <div class="mb-3">
                                <label id="label-usuario" for="input-usuario" class="form-label">Usuario o Email</label>
                                <input type="text" class="form-control" id="input-usuario"
                                    placeholder="Introduce tu usuario o email">
                                <div class="invalid-feedback" id="error-usuario">
                                    Por favor, introduce tu usuario o email.
                                </div>
                            </div>

                            <!-- Campo Contraseña -->
                            <div class="mb-3">
                                <label id="label-password" for="input-password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="input-password"
                                    placeholder="Introduce tu contraseña">
                                <div class="invalid-feedback" id="error-password">
                                    Por favor, introduce tu contraseña.
                                </div>
                            </div>

                            <!-- Checkbox Recordarme -->
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="check-recordar">
                                <label id="label-recordar" class="form-check-label" for="check-recordar">
                                    Recordarme
                                </label>
                            </div>

                            <!-- Botón Iniciar Sesión -->
                            <button type="submit" id="btn-login" class="btn btn-primary w-100">
                                Iniciar Sesión
                            </button>

                        </form>

                        <!-- Contenedor para mensajes de éxito/error -->
                        <div id="mensaje-login" class="mt-3"></div>
                    </div>

                    <!-- Footer con enlace a registro -->
                    <div class="card-footer text-center">
                        <span id="texto-no-cuenta">¿No tienes cuenta? </span>
                        <a id="enlace-registro" href="registro.html" class="text-decoration-none">Regístrate</a>
                    </div>

                </div>
            </div>
        </div>

    </main>

    <!-- ===================== FOOTER (idéntico en todas las páginas) ===================== -->
    <footer class="text-center py-3 mt-4">
        <p class="mb-0">Steam Store &copy; 2000 - Proyecto Lenguajes de Marca</p>
    </footer>

    <!-- ===================== SCRIPTS ===================== -->

    <!-- Bootstrap 5 JS Bundle (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Nuestros scripts (orden importante) -->
    <script src="js/traducciones.js"></script>
    <script src="js/dataLoader.js"></script>
    <script src="js/common.js"></script>
    <script src="js/login.js"></script>

</body>
</html>
